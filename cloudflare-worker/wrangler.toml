name = "neo-webhook"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
APP_URL = "https://kashify.vercel.app"

# Secrets — configurar con: wrangler secret put <NOMBRE>
# WHATSAPP_VERIFY_TOKEN     — token de verificación del webhook (debe coincidir con Meta)
# WHATSAPP_APP_SECRET       — app secret de Meta, para verificar la firma HMAC
# WHATSAPP_PHONE_NUMBER_ID  — ID del número de WhatsApp Cloud API
# WHATSAPP_ACCESS_TOKEN     — access token de Meta para enviar mensajes
# SUPABASE_URL              — URL del proyecto Supabase
# SUPABASE_SERVICE_ROLE_KEY — service role key de Supabase
# PROCESS_WEBHOOK_SECRET    — secreto compartido con el backend (== CRON_SECRET en Vercel)
