<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kashify - Asistente Financiero Personal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #667eea; margin-bottom: 10px; font-size: 32px; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 16px; }
    p { color: #555; line-height: 1.6; margin-bottom: 30px; }
    .contact {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .contact a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .status {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Kashify</h1>
    <p class="subtitle">Asistente Financiero Personal</p>
    
    <p>
      Herramienta privada para gestionar tus gastos e ingresos en WhatsApp.
      Visualiza reportes, controla tu presupuesto y toma decisiones financieras informadas.
    </p>
    
    <div class="contact">
      Contacto: <a href="mailto:franremonda@gmail.com">franremonda@gmail.com</a>
    </div>
    
    <div class="status">
      ✓ Plataforma en desarrollo
    </div>
  </div>
</body>
</html>
